<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite Noivado</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --azul:#004AAD;
      --vh:1vh; /* fallback, será atualizado pelo JS */
    }

    body{
      margin:0;
      padding:0;
      height:100dvh;
      overflow:hidden;
      touch-action:none;
      font-family:"Cormorant Garamond",serif;
      background-color:#ffffff;
      background-image:url("https://raw.githubusercontent.com/ysmmCF/Casamento/main/Dayvid_20260402_193220_0000.png");
      background-repeat:no-repeat;
      background-position:center center;
      background-size:contain;
      position:relative;
    }

    /* IMAGEM INVISÍVEL (SÓ PRA SERVIR DE LIMITE PRO JS) */
    #fundoConvite{
      width:100%;
      height:100dvh;
      object-fit:contain;
      display:block;
      opacity:0;
      pointer-events:none;
      position:absolute;
      top:0;
      left:0;
      z-index:-1;
    }

    /* ELEMENTOS POR CIMA */
    .countdown-area,
    .menu-botoes{
      position:fixed; /* FIXED PARA iOS */
      left:50%;
      transform:translateX(-50%);
      width:100%;
      max-width:500px;
      text-align:center;
      z-index:5;
    }

    /* ===================== */
    /* POPUP PREMIUM */
    /* ===================== */
    .popup-overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.38);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:25;
    }

    .popup-box{
      position:relative;
      background:#ffffff;
      border:1px solid rgba(0,74,173,0.85);
      border-radius:28px;
      padding:55px 38px;
      width:60%;
      max-width:560px;
      text-align:center;
      color:var(--azul);
      font-family:"Cormorant Garamond",serif;
      box-shadow:0px 18px 50px rgba(0,0,0,0.22);
    }

    .popup-box p{
      margin:0;
      font-size:24px;
      letter-spacing:1px;
      line-height:2;
    }

    .popup-box p strong{
      font-weight:700;
    }

    .popup-fechar{
      position:absolute;
      top:18px;
      right:22px;
      font-size:38px;
      font-weight:800;
      color:var(--azul);
      cursor:pointer;
      transition:0.25s ease;
      user-select:none;
    }

    .popup-fechar:hover{
      transform:scale(1.15);
      opacity:0.8;
    }

    /* ===================== */
    /* CONTAGEM */
    /* ===================== */
    .countdown-area{
      top:calc(var(--vh) * 66);
      margin-left:55px;
      color:var(--azul);
    }

    .countdown-title{
      font-size:16px;
      letter-spacing:2px;
      text-transform:uppercase;
      margin-bottom:18px;
      opacity:0.9;
    }

    .countdown{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }

    .countdown-row{
      display:flex;
      justify-content:center;
      gap:30px;
    }

    .time-box{
      display:flex;
      flex-direction:column;
      align-items:center;
      min-width:90px;
    }

    .time-number{
      font-size:36px;
      font-weight:300;
      letter-spacing:2px;
    }

    .time-label{
      font-size:12px;
      margin-top:4px;
      opacity:0.75;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    /* ===================== */
    /* BOTÕES */
    /* ===================== */
    .menu-botoes{
      top:calc(var(--vh) * 53.9);
      margin-left:5px;
      display:flex;
      justify-content:center;
      gap:28px;
    }

    .botao-menu{
      text-decoration:none;
      color:var(--azul);
      display:flex;
      flex-direction:column;
      align-items:center;
      transition:0.3s ease;
    }

    .botao-menu i{
      font-size:22px;
      padding:12px;
      border:1px solid rgba(0,74,173,0.35);
      border-radius:50%;
      transition:0.3s ease;
      background:rgba(255,255,255,0.35);
      backdrop-filter:blur(4px);
    }

    .botao-menu span{
      margin-top:8px;
      font-size:11px;
      letter-spacing:1px;
      text-transform:uppercase;
      opacity:0.85;
      text-align:center;
    }

    .botao-menu:hover i{
      background:rgba(0,74,173,0.08);
      border:1px solid rgba(0,74,173,0.55);
      transform:scale(1.05);
    }

    .botao-menu:hover span{
      opacity:1;
    }

    /* ===================== */
    /* CELULAR */
    /* ===================== */
    @media(max-width:420px){
      .time-number{ font-size:32px; }
      .countdown-row{ gap:20px; }
      .time-box{ min-width:80px; }
      .menu-botoes{ gap:18px; }
      .botao-menu i{ font-size:20px; padding:10px; }
      .popup-box p{ font-size:20px; }
    }
  </style>
</head>

<body>

  <!-- IMAGEM INVISÍVEL (LIMITE DO JS) -->
  <img id="fundoConvite" src="https://raw.githubusercontent.com/ysmmCF/Casamento/main/Linafundo2.png" alt="Fundo Convite">

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup-box">
      <span class="popup-fechar" id="fecharPopup">✕</span>
      <p>
        <strong>Site interativo!</strong><br>
        Aperte nos botões para mais informações.
        <br><br>
        <strong>Confirme presença até o dia 25/08</strong>
      </p>
    </div>
  </div>

  <!-- MÚSICA -->
  <audio id="musicaNoivado" preload="auto">
    <source src="https://raw.githubusercontent.com/ysmmCF/Casamento/main/YTDown.com_YouTube_Media_DLDA0mYTnms_009_128k.mp3" type="audio/mpeg">
  </audio>

  <!-- CONTAGEM -->
  <div class="countdown-area">
    <p class="countdown-title">Contagem regressiva</p>
    <div class="countdown">
      <div class="countdown-row">
        <div class="time-box">
          <span id="dias" class="time-number">00</span>
          <span class="time-label">Dias</span>
        </div>
        <div class="time-box">
          <span id="horas" class="time-number">00</span>
          <span class="time-label">Horas</span>
        </div>
      </div>
      <div class="countdown-row">
        <div class="time-box">
          <span id="minutos" class="time-number">00</span>
          <span class="time-label">Min</span>
        </div>
        <div class="time-box">
          <span id="segundos" class="time-number">00</span>
          <span class="time-label">Seg</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTÕES -->
  <div class="menu-botoes">
    <a href="https://wa.me/5521968690474?text=Adorei%20o%20convite!%20Confirmo%20a%20minha%20presença!" class="botao-menu">
      <i class="fa-regular fa-circle-check"></i>
      <span>Confirmação<br>de Presença</span>
    </a>
    <a href="https://maps.app.goo.gl/RYXmwkLWAW8cs3Xc9?g_st=ac" class="botao-menu">
      <i class="fa-regular fa-map"></i>
      <span>Local</span>
    </a>
    <a href="https://alziraedayvid.listaideal.com.br/pt/" class="botao-menu">
      <i class="fa-solid fa-gift"></i>
      <span>Sugestões<br>de Presentes</span>
    </a>
  </div>

  <script>
    /* =======================
       VARIÁVEL --VH PARA iOS
    ======================= */
    function atualizarAlturaVH(){
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', atualizarAlturaVH);
    window.addEventListener('load', atualizarAlturaVH);
    atualizarAlturaVH();

    /* =======================
       AJUSTE ESPECÍFICO iOS: DESCE 3.5dvh
    ======================= */
    function ajustarIOS(){
      const iOS = /iP(ad|hone|od)/.test(navigator.userAgent);
      if(!iOS) return;

      const deslocamento = 1.8 * window.innerHeight * 0.01; // 3.5dvh
      const img = document.getElementById("fundoConvite");
      const menu = document.querySelector(".menu-botoes");
      const countdown = document.querySelector(".countdown-area");

      if(img) img.style.top = `${deslocamento}px`;
      if(menu) menu.style.top = `calc(${parseFloat(getComputedStyle(menu).top)}px + ${deslocamento}px)`;
      if(countdown) countdown.style.top = `calc(${parseFloat(getComputedStyle(countdown).top)}px + ${deslocamento}px)`;
    }
    window.addEventListener("load", ajustarIOS);
    window.addEventListener("resize", ajustarIOS);
    ajustarIOS();

    /* =======================
       CONTAGEM REGRESSIVA
    ======================= */
    const imgFundo = document.getElementById("fundoConvite");

    function atualizarCountdown(){
      const dataNoivado = new Date("2026-09-06T19:00:00").getTime();
      const agora = new Date().getTime();
      const distancia = dataNoivado - agora;

      if(distancia <= 0){
        document.getElementById("dias").innerHTML = "00";
        document.getElementById("horas").innerHTML = "00";
        document.getElementById("minutos").innerHTML = "00";
        document.getElementById("segundos").innerHTML = "00";
        return;
      }

      const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
      const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
      const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

      document.getElementById("dias").innerHTML = String(dias).padStart(2,"0");
      document.getElementById("horas").innerHTML = String(horas).padStart(2,"0");
      document.getElementById("minutos").innerHTML = String(minutos).padStart(2,"0");
      document.getElementById("segundos").innerHTML = String(segundos).padStart(2,"0");
    }

    setInterval(atualizarCountdown, 1000);
    atualizarCountdown();

    /* ==========================
       BARREIRA: NADA PODE PASSAR DO FUNDO (IMG)
    ========================== */
    function travarDentroDaImagem(selector, margem = 10){
      const el = document.querySelector(selector);
      const img = document.getElementById("fundoConvite");
      if(!el || !img) return;

      const rectEl = el.getBoundingClientRect();
      const rectImg = img.getBoundingClientRect();

      let topAtual = parseFloat(getComputedStyle(el).top) || 0;
      const limiteTopo = rectImg.top + margem;
      const limiteBaixo = rectImg.bottom - margem;

      if(rectEl.top < limiteTopo){
        el.style.top = (topAtual + (limiteTopo - rectEl.top)) + "px";
      }
      if(rectEl.bottom > limiteBaixo){
        el.style.top = (topAtual - (rectEl.bottom - limiteBaixo)) + "px";
      }
    }

    function aplicarBarreiraImagem(){
      travarDentroDaImagem(".countdown-area", 15);
      travarDentroDaImagem(".menu-botoes", 15);
    }

    function ajustarTudoDireito(){
      aplicarBarreiraImagem();
      setTimeout(aplicarBarreiraImagem, 100);
      setTimeout(aplicarBarreiraImagem, 300);
      setTimeout(aplicarBarreiraImagem, 600);
      setTimeout(aplicarBarreiraImagem, 1000);
    }

    imgFundo.addEventListener("load", ajustarTudoDireito);
    if(imgFundo.complete){ ajustarTudoDireito(); }
    window.addEventListener("resize", ajustarTudoDireito);

    /* ==========================
       POPUP + MÚSICA
    ========================== */
    const popupOverlay = document.getElementById("popupOverlay");
    const fecharPopup = document.getElementById("fecharPopup");
    const musica = document.getElementById("musicaNoivado");

    window.addEventListener("load", () => {
      setTimeout(() => { popupOverlay.style.display = "flex"; }, 1000);
    });

    function fadeInAudio(audio, duration = 3000){
      audio.volume = 0.03;
      audio.play();
      const stepTime = 60;
      const steps = duration / stepTime;
      const volumeStep = (1 - 0.03) / steps;
      let currentStep = 0;

      const fadeInterval = setInterval(() => {
        currentStep++;
        audio.volume = Math.min(1, audio.volume + volumeStep);
        if(currentStep >= steps){
          audio.volume = 1;
          clearInterval(fadeInterval);
        }
      }, stepTime);
    }

    fecharPopup.addEventListener("click", () => {
      popupOverlay.style.display = "none";
      fadeInAudio(musica, 3000);
    });
  </script>
</body>
</html>
